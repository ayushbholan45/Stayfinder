services:
  web:
    build: .
    command: daphne -b 0.0.0.0 -p 8000 stayfinder_backend.asgi:application
    volumes:
      - .:/usr/src/stayfinder_backend
    ports:
      - 8000:8000
    env_file:
      - ./.env.dev
    depends_on:
      - db
  db:
    image: postgres:17
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    environment:
      - POSTGRES_USER=postgresuser
      - POSTGRES_PASSWORD=postgrespassword
      - POSTGRES_DB=stayfinderdb
volumes:
  postgres_data: